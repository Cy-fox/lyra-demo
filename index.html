<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Lyra 3.0 - AI Trading Framework</title>
  <meta name="description" content="Multi-market algorithmic trading framework with a meta-labeling ML gate (pooled per-market LightGBM models)">
  <meta property="og:title" content="Lyra - AI Trading Framework">
  <meta property="og:description" content="Multi-market algorithmic trading framework with a meta-labeling ML gate (pooled per-market LightGBM models)">
  <meta property="og:image" content="logo_200.png">
  <link rel="icon" type="image/png" sizes="80x80" href="logo_80.png">
  <link rel="apple-touch-icon" href="logo_200.png">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:         #050508;
      --bg-raised:  rgba(12,12,22,0.85);
      --bg-card:    rgba(18,18,32,0.5);
      --bg-hover:   rgba(255,255,255,0.03);
      --border:     rgba(255,255,255,0.04);
      --border-h:   rgba(255,255,255,0.08);
      --text:       #e2e8f0;
      --text-dim:   #64748b;
      --text-muted: rgba(148,163,184,0.4);
      --accent:     #8b5cf6;
      --accent-dim: rgba(139,92,246,0.08);
      --accent-bd:  rgba(139,92,246,0.15);
      --green:      #10b981;
      --green-dim:  rgba(16,185,129,0.08);
      --green-border: rgba(16,185,129,0.2);
      --red:        #ef4444;
      --red-dim:    rgba(239,68,68,0.08);
      --red-border: rgba(239,68,68,0.2);
      --orange:     #f59e0b;
      --orange-dim: rgba(245,158,11,0.08);
      --orange-border: rgba(245,158,11,0.2);
      --blue:       #3b82f6;
      --mono:       'JetBrains Mono', monospace;
      --sans:       'DM Sans', sans-serif;
      --radius:     10px;
      --radius-lg:  14px;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    * { -webkit-tap-highlight-color: transparent; }
    body { font-family: var(--sans); background: var(--bg); color: var(--text); height: 100vh; height: 100dvh; overflow: hidden; position: relative; -webkit-text-size-adjust: 100%; }

    /* ── Layout ── */
    .app-layout { display: flex; height: 100vh; height: 100dvh; }
    .main-content { flex: 1; min-width: 0; overflow-y: auto; overscroll-behavior: contain; -webkit-overflow-scrolling: touch; padding: 28px 36px; }
    @media (max-width: 768px) { .main-content { padding: 16px; } }
    /* zoom multiplies rendered height - divide 100vh back down or the bottom
       of the page gets cut off and becomes unreachable (broken scroll) */
    @media (min-width: 2000px) { .app-layout { zoom: 1.25; height: calc(100vh / 1.25); } .main-content { padding: 32px 44px; } }
    @media (min-width: 2800px) { .app-layout { zoom: 1.45; height: calc(100vh / 1.45); } }
    @media (min-width: 3400px) { .app-layout { zoom: 1.65; height: calc(100vh / 1.65); } }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 9px; height: 9px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--accent-bd); border-radius: 10px; border: 2px solid transparent; background-clip: padding-box; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); border: 2px solid transparent; background-clip: padding-box; }
    * { scrollbar-width: thin; scrollbar-color: rgba(139,92,246,0.3) transparent; }

    /* ── Indices cyan theme override ── */
    .theme-indices {
      --accent:     #06b6d4;
      --accent-dim: rgba(6,182,212,0.08);
      --accent-bd:  rgba(6,182,212,0.15);
    }
    .theme-indices .card:hover { border-color: var(--accent-bd); }
    .theme-indices .metric-card { border-color: var(--accent-bd); }
    .theme-indices .market-card:hover { border-color: var(--accent-bd); }
    .theme-indices ::-webkit-scrollbar-thumb { background: rgba(6,182,212,0.15); }
    .theme-indices .cursor-ring { border-color: rgba(6,182,212,0.35); }
    .theme-indices .cursor-hover .cursor-ring { border-color: rgba(6,182,212,0.5); }
    .theme-indices .ms-item.selected { box-shadow: 0 0 12px rgba(6,182,212,0.1); }
    .theme-indices .btn-primary:hover { background: #0891b2; }
    .theme-indices .tf-btn.active { background: transparent; border-color: #06b6d4; color: #06b6d4; }
    .theme-indices .btn-primary { background: transparent; border-color: #06b6d4; color: #06b6d4; }
    .theme-indices .entry-crypto { background: radial-gradient(ellipse at center, rgba(6,182,212,0.15) 0%, rgba(3,3,8,0.95) 70%); }
    .theme-indices .card { border-color: var(--accent-bd); }
    .theme-indices .card-label { color: rgba(6,182,212,0.7); }
    .theme-indices .section-label { color: var(--accent); }
    .theme-indices .page-title { color: #06b6d4; }
    .theme-indices .pos-banner { border-color: var(--accent-bd); }

    /* ── Forex green theme override ── */
    .theme-forex {
      --accent:     #22c55e;
      --accent-dim: rgba(34,197,94,0.08);
      --accent-bd:  rgba(34,197,94,0.15);
    }
    .theme-forex .card:hover { border-color: var(--accent-bd); }
    .theme-forex .metric-card { border-color: var(--accent-bd); }
    .theme-forex .market-card:hover { border-color: var(--accent-bd); }
    .theme-forex ::-webkit-scrollbar-thumb { background: rgba(34,197,94,0.15); }
    .theme-forex .cursor-ring { border-color: rgba(34,197,94,0.35); }
    .theme-forex .cursor-hover .cursor-ring { border-color: rgba(34,197,94,0.5); }
    .theme-forex .ms-item.selected { box-shadow: 0 0 12px rgba(34,197,94,0.1); }
    .theme-forex .btn-primary:hover { background: #16a34a; }
    .theme-forex .tf-btn.active { background: transparent; border-color: #22c55e; color: #22c55e; }
    .theme-forex .btn-primary { background: transparent; border-color: #22c55e; color: #22c55e; }
    .theme-forex .entry-crypto { background: radial-gradient(ellipse at center, rgba(34,197,94,0.15) 0%, rgba(3,3,8,0.95) 70%); }
    .theme-forex .card { border-color: var(--accent-bd); }
    .theme-forex .card-label { color: rgba(34,197,94,0.7); }
    .theme-forex .section-label { color: var(--accent); }
    .theme-forex .page-title { color: #22c55e; }
    .theme-forex .pos-banner { border-color: var(--accent-bd); }

    /* ── Futures orange theme override ── */
    .theme-futures {
      --accent:     #f97316;
      --accent-dim: rgba(249,115,22,0.08);
      --accent-bd:  rgba(249,115,22,0.15);
    }
    .theme-futures .card:hover { border-color: var(--accent-bd); }
    .theme-futures .metric-card { border-color: var(--accent-bd); }
    .theme-futures .market-card:hover { border-color: var(--accent-bd); }
    .theme-futures ::-webkit-scrollbar-thumb { background: rgba(249,115,22,0.15); }
    .theme-futures .cursor-ring { border-color: rgba(249,115,22,0.35); }
    .theme-futures .cursor-hover .cursor-ring { border-color: rgba(249,115,22,0.5); }
    .theme-futures .ms-item.selected { box-shadow: 0 0 12px rgba(249,115,22,0.1); }
    .theme-futures .btn-primary:hover { background: #ea580c; }
    .theme-futures .tf-btn.active { background: transparent; border-color: #f97316; color: #f97316; }
    .theme-futures .btn-primary { background: transparent; border-color: #f97316; color: #f97316; }
    .theme-futures .entry-crypto { background: radial-gradient(ellipse at center, rgba(249,115,22,0.15) 0%, rgba(3,3,8,0.95) 70%); }
    .theme-futures .card { border-color: var(--accent-bd); }
    .theme-futures .card-label { color: rgba(249,115,22,0.7); }
    .theme-futures .section-label { color: var(--accent); }
    .theme-futures .page-title { color: #f97316; }
    .theme-futures .pos-banner { border-color: var(--accent-bd); }


    /* ── Sidebar ── */
    .sidebar { width: 56px; min-width: 56px; height: 100vh; background: rgba(8,8,16,0.92); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 12px 0; transition: width 0.25s ease; overflow: hidden; z-index: 20; flex-shrink: 0; backdrop-filter: blur(12px); }
    .sidebar.expanded { width: 180px; min-width: 180px; }
    .sb-brand { display: flex; align-items: center; gap: 10px; padding: 4px 17px 16px; }
    .sb-brand-text { font-size: 11px; font-weight: 700; letter-spacing: 0.14em; color: var(--accent); white-space: nowrap; opacity: 0; transition: opacity 0.2s; }
    .sidebar.expanded .sb-brand-text { opacity: 1; }
    .sb-logo { cursor: pointer; flex-shrink: 0; }
    .sb-section { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); padding: 14px 18px 6px; white-space: nowrap; opacity: 0; transition: opacity 0.2s; }
    .sidebar.expanded .sb-section { opacity: 1; }
    .sb-item { display: flex; align-items: center; gap: 10px; padding: 9px 17px; cursor: pointer; color: var(--text-dim); transition: all 0.2s; border-left: 2px solid transparent; white-space: nowrap; }
    .sb-item:hover { color: var(--text); background: var(--bg-hover); }
    .sb-item.active { color: var(--accent); border-left-color: var(--accent); background: var(--accent-dim); }
    .sb-icon { flex-shrink: 0; display: flex; align-items: center; justify-content: center; width: 20px; }
    .sb-label { font-size: 12px; font-weight: 500; opacity: 0; transition: opacity 0.2s; }
    .sidebar.expanded .sb-label { opacity: 1; }
    .sb-badge { font-size: 9px; font-weight: 700; background: var(--accent); color: #fff; border-radius: 8px; padding: 1px 6px; margin-left: auto; opacity: 0; transition: opacity 0.2s; }
    .sidebar.expanded .sb-badge { opacity: 1; }
    .sb-divider { height: 1px; background: var(--border); margin: 8px 14px; }
    .sb-spacer { flex: 1; max-height: 120px; }
    .sb-toggle { display: flex; align-items: center; justify-content: center; padding: 8px 17px; cursor: pointer; color: var(--text-dim); transition: color 0.2s; }
    .sb-toggle:hover { color: var(--text); }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .status-dot-live { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse-dot 2s infinite; }
    @keyframes pulse-dot { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

    /* ── News Ticker ── */
    .news-ticker { overflow: hidden; background: rgba(10,10,20,0.6); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 16px; margin-bottom: 16px; backdrop-filter: blur(8px); }
    .news-ticker-inner { display: flex; gap: 28px; animation: ticker-scroll 50s linear infinite; white-space: nowrap; }
    .news-ticker-item { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
    @keyframes ticker-scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

    /* ── Stat Grid (top cards) ── */
    .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
    @media (min-width: 1800px) { .stat-grid { gap: 16px; } }
    @media (max-width: 900px) { .stat-grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 600px) { .stat-grid { grid-template-columns: 1fr; } }

    /* ── Cards ── */
    .card { background: rgba(18,18,32,0.45); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px; transition: border-color 0.2s; backdrop-filter: blur(8px); }
    .card:hover { border-color: var(--border-h); }
    .card-label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; }
    .card-value { font-family: var(--mono); font-size: 22px; font-weight: 600; }
    .card-sub { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

    /* ── Badges ── */
    .badge { font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 6px; display: inline-block; }
    .badge-green { background: var(--green-dim); color: var(--green); border: 1px solid var(--green-border); }
    .badge-accent { background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent-bd); }
    .badge-orange { background: var(--orange-dim); color: var(--orange); border: 1px solid var(--orange-border); }
    .badge-red { background: var(--red-dim); color: var(--red); border: 1px solid var(--red-border); }

    /* ── Buttons ── */
    .btn { font-family: var(--sans); font-size: 12px; font-weight: 600; padding: 8px 16px; border-radius: var(--radius); border: 1px solid var(--border-h); background: var(--bg-card); color: var(--text); cursor: pointer; transition: all 0.2s; }
    .btn:hover { border-color: var(--accent-bd); background: var(--accent-dim); }
    .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn-primary:hover { filter: brightness(0.85); }
    .btn-danger { background: var(--red-dim); border-color: var(--red-border); color: var(--red); }
    .btn-danger:hover { background: rgba(239,68,68,0.2); }
    .btn-ghost { background: transparent; border-color: var(--border-h); color: var(--text-dim); }
    .btn-ghost:hover { color: var(--text); background: var(--bg-hover); }

    /* ── Page title ── */
    .page-title { font-size: 20px; font-weight: 600; color: var(--text); letter-spacing: -0.01em; }
    .panel-title { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; }

    /* ── Metrics grid ── */
    .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 14px; }
    @media (min-width: 1800px) { .metrics-grid { grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; } }
    .metric-card { background: rgba(18,18,32,0.45); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; backdrop-filter: blur(8px); }
    .metric-label { font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 5px; }
    .metric-value { font-family: var(--mono); font-size: 17px; font-weight: 600; }
    .metric-sub { font-size: 10px; color: var(--text-dim); margin-top: 3px; }

    /* ── Ticker dot ── */
    .ticker-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

    /* ── Bot cards grid ── */
    .market-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
    @media (min-width: 1800px) { .market-grid { grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; } }
    @media (min-width: 2400px) { .market-grid { grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 18px; } }
    .market-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; cursor: pointer; transition: all 0.2s; }
    .market-card:hover { border-color: var(--accent-bd); transform: translateY(-1px); }
    .mc-pos-glow { border-color: var(--orange-border); box-shadow: 0 0 20px rgba(245,158,11,0.06); }
    .mc-pair { font-weight: 600; font-size: 14px; margin-top: 4px; }
    .mc-price { font-family: var(--mono); font-size: 12px; color: var(--text-dim); margin-top: 2px; }
    .mc-meta { font-size: 10px; color: var(--text-muted); margin-top: 1px; }
    .mc-value { font-family: var(--mono); font-size: 18px; font-weight: 600; margin-top: 6px; }
    .mc-change { font-family: var(--mono); font-size: 12px; font-weight: 500; }
    .mc-status { display: flex; align-items: center; gap: 5px; justify-content: flex-end; }
    .mc-pos-tag { font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 4px; background: var(--orange-dim); color: var(--orange); border: 1px solid var(--orange-border); text-transform: uppercase; letter-spacing: 0.04em; }

    /* ── Section / Position labels ── */
    .section-label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin: 18px 0 10px; }

    /* ── Position banner ── */
    .pos-banner { display: flex; align-items: center; gap: 8px; padding: 8px 14px; background: var(--orange-dim); border: 1px solid var(--orange-border); border-radius: var(--radius); margin-bottom: 14px; font-size: 12px; }

    /* ── Bot header & detail ── */
    .bot-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
    .bot-icon { width: 38px; height: 38px; border-radius: 10px; background: var(--accent-dim); border: 1px solid var(--accent-bd); display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 600; color: var(--accent); flex-shrink: 0; }
    .bot-actions { display: flex; gap: 6px; margin-left: auto; }
    .price-big { font-family: var(--mono); font-size: 24px; font-weight: 700; }
    .back-link { font-size: 12px; color: var(--text-dim); cursor: pointer; display: inline-flex; align-items: center; gap: 4px; margin-bottom: 12px; background: none; border: 1px solid var(--border-h); padding: 5px 10px; border-radius: var(--radius); }
    .back-link:hover { color: var(--accent); border-color: var(--accent-bd); }
    .no-position { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; padding: 30px; color: var(--text-muted); font-size: 13px; }

    /* ── Chart/position grid ── */
    .chart-pos-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
    @media (min-width: 1800px) { .chart-pos-grid { gap: 18px; } }
    @media (max-width: 900px) { .chart-pos-grid { grid-template-columns: 1fr; } }

    /* ── Tab bar ── */
    .tab-bar { display: flex; gap: 2px; }
    .tab-item { font-size: 12px; font-weight: 500; padding: 7px 14px; border-radius: var(--radius); cursor: pointer; color: var(--text-dim); transition: all 0.15s; }
    .tab-item:hover { color: var(--text); background: var(--bg-hover); }
    .tab-item.active { color: var(--text); background: var(--bg-card); border: 1px solid var(--border-h); }

    /* ── Panels grid (LLM / trades / logs) ── */
    .panels-grid { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 14px; }
    @media (min-width: 1800px) { .panels-grid { gap: 18px; } }
    @media (max-width: 900px) { .panels-grid { grid-template-columns: 1fr; } }
    .panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; }
    .panel-scroll { max-height: 240px; overflow-y: auto; }

    /* ── Trade tags ── */
    .trade-tag { font-size: 9px; font-weight: 600; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
    .tag-profit { background: var(--green-dim); color: var(--green); border: 1px solid var(--green-border); }
    .tag-loss { background: var(--red-dim); color: var(--red); border: 1px solid var(--red-border); }
    .trade-entry { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--border); }

    /* ── Indicators ── */
    .ind-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
    .ind-value { font-family: var(--mono); font-size: 12px; font-weight: 500; }

    /* ── LLM entries ── */
    .llm-entry { padding: 10px 0; border-bottom: 1px solid var(--border); }
    .llm-time { font-size: 10px; color: var(--text-muted); font-family: var(--mono); }
    .llm-decision { font-weight: 600; font-size: 13px; margin: 2px 0; }
    .llm-text { font-size: 11px; color: var(--text-dim); line-height: 1.5; }

    /* ── Log entries ── */
    .log-entry { font-family: var(--mono); font-size: 11px; padding: 4px 0; color: var(--text-dim); border-bottom: 1px solid var(--border); }

    /* ── Colors ── */
    .t-green { color: var(--green) !important; }
    .t-red { color: var(--red) !important; }
    .t-orange { color: var(--orange) !important; }
    .t-accent { color: var(--accent) !important; }
    .t-dim { color: var(--text-dim) !important; }
    .t-muted { color: var(--text-muted) !important; }
    .t-mono { font-family: var(--mono) !important; }

    /* ── Custom Cursor (desktop only) ── */
    @media (pointer: fine) { *:not(select):not(option) { cursor: none !important; } select { cursor: pointer !important; } }
    .cursor-dot {
      position: fixed; top: 0; left: 0; z-index: 9999;
      width: 5px; height: 5px; border-radius: 50%;
      background: #e2e8f0; pointer-events: none;
      transform: translate(-50%, -50%);
      transition: background 0.15s, transform 0.1s;
    }
    .cursor-ring {
      position: fixed; top: 0; left: 0; z-index: 9998;
      width: 32px; height: 32px; border-radius: 50%;
      border: 1.5px solid var(--accent-bd);
      pointer-events: none;
      transform: translate(-50%, -50%);
      transition: width 0.2s, height 0.2s, border-color 0.2s;
    }
    .cursor-hover .cursor-dot { background: var(--accent); transform: translate(-50%, -50%) scale(1.5); }
    .cursor-hover .cursor-ring { width: 44px; height: 44px; border-color: var(--accent); }

    /* ── Toast Notifications ── */
    .toast-container { position: fixed; top: 16px; right: 16px; z-index: 10000; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }

  <canvas id="bg-particles" style="position:fixed;inset:0;width:100vw;height:100vh;z-index:0;pointer-events:none;"></canvas>

  <!-- Background particles animation -->
  <script>
  (function(){
    var c=document.getElementById('bg-particles'),g=c.getContext('2d'),W,H,pts=[];
    function sz(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}
    sz(); window.addEventListener('resize',sz);
    var NP=window.innerWidth<=768?45:120; // fewer particles on mobile - the O(n²) link pass is heavy
    for(var i=0;i<NP;i++) pts.push({x:Math.random()*2000,y:Math.random()*2000,vx:(Math.random()-.5)*.28,vy:(Math.random()-.5)*.28,r:Math.random()*2.8+1.2,o:Math.random()*.30+.20});
    function draw(){
      g.clearRect(0,0,W,H);
      for(var i=0;i<pts.length;i++){
        var p=pts[i]; p.x+=p.vx; p.y+=p.vy;
        if(p.x<0)p.x=W; if(p.x>W)p.x=0; if(p.y<0)p.y=H; if(p.y>H)p.y=0;
        g.beginPath(); g.arc(p.x,p.y,p.r,0,6.28);
        g.fillStyle='rgba(139,92,246,'+p.o+')'; g.fill();
      }
      for(var i=0;i<pts.length;i++){
        for(var j=i+1;j<pts.length;j++){
          var dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);
          if(d<200){g.beginPath();g.moveTo(pts[i].x,pts[i].y);g.lineTo(pts[j].x,pts[j].y);
          g.strokeStyle='rgba(139,92,246,'+(0.30*(1-d/200))+')';g.lineWidth=1.0;g.stroke();}
        }
      }
      requestAnimationFrame(draw);
    }
    draw();
  })();
  </script>

  <!-- Custom cursor logic -->
  <script>
  (function(){
    var dot=document.getElementById('cursor-dot'),ring=document.getElementById('cursor-ring');
    var mx=0,my=0,rx=0,ry=0;
    document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY;dot.style.left=mx+'px';dot.style.top=my+'px';});
    function lerp(){rx+=(mx-rx)*0.15;ry+=(my-ry)*0.15;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(lerp);}
    lerp();
    document.addEventListener('mouseover',function(e){
      var t=e.target;
      if(t.tagName==='BUTTON'||t.tagName==='A'||t.classList.contains('sb-item')||t.classList.contains('market-card')||t.classList.contains('tab-item')||t.classList.contains('tf-btn')||t.style.cursor==='pointer'||t.closest('[onclick]')||t.closest('button')||t.closest('a')||t.closest('.sb-item')||t.closest('.market-card'))
        document.body.classList.add('cursor-hover');
    });
    document.addEventListener('mouseout',function(e){
      var t=e.target;
      if(t.tagName==='BUTTON'||t.tagName==='A'||t.classList.contains('sb-item')||t.classList.contains('market-card')||t.classList.contains('tab-item')||t.classList.contains('tf-btn')||t.closest('[onclick]')||t.closest('button')||t.closest('a')||t.closest('.sb-item')||t.closest('.market-card'))
        document.body.classList.remove('cursor-hover');
    });
    if('ontouchstart' in window){dot.style.display='none';ring.style.display='none';}
  })();
  </script>

    }
    equity[19] = bot.capital;
    const px = p => p >= 1 ? Math.round(p * 100) / 100 : Math.round(p * 10000) / 10000;
    const trades = Array.from({length: Math.min(bot.trades, 5)}, (_, i) => {
      const win = rnd() > 0.55;
      const pct = win ? 0.5 + rnd() * 2.2 : -(0.3 + rnd() * 1.4);
      const entry = px(bot.price * (1 - 0.01 * (i + 1) * (rnd() - 0.4)));
      return { close_time: `2026-0${6 - Math.floor(i / 4)}-${String(28 - i * 5).padStart(2,'0')}`,
               entry, exit: px(entry * (1 + dir * pct / 100)),
               pnl_pct: Math.round(pct * 100) / 100,
               pnl_usdt: Math.round(pct * bot.capital * 0.003 * 100) / 100,
               reason: win ? (rnd() > 0.5 ? 'TP' : 'TRAIL') : 'SL' };
    });
    const pw = 34 + Math.round(rnd() * 32);
    const ev = Math.round((pw / 100 * 3 - (1 - pw / 100)) * 100) / 100;
    return {
      price: bot.price,
      indicators: { ma_fast: px(bot.price * 0.985), ma_200: px(bot.price * 0.94),
                    rsi: 38 + Math.round(rnd() * 28), atr_pct: Math.round((0.4 + rnd() * 1.6) * 100) / 100,
                    volume_ratio: Math.round((0.8 + rnd() * 0.7) * 100) / 100 },
      metrics: { total_trades: bot.trades, wins, losses,
                 win_rate: Math.round(wins / Math.max(bot.trades, 1) * 1000) / 10,
                 profit_factor: Math.round((0.8 + rnd() * 1.4) * 100) / 100,
                 total_pnl: Math.round((bot.capital - initial) * 100) / 100,
                 fees_paid: Math.round(bot.trades * 1.7 * 100) / 100,
                 best_trade: Math.round((1.5 + rnd() * 3) * 100) / 100,
                 worst_trade: -Math.round((0.8 + rnd() * 2.5) * 100) / 100 },
      equity,
      position: bot.has_position ? {
        entry: px(bot.price * (1 - dir * 0.012)), size: Math.round(bot.capital * 0.3),
        open_time: '2026-07-02T04:07:00', current_pnl: Math.round(dir * 1.2 * 100) / 100,
        max_pnl: Math.round(dir * 1.2 * 100) / 100 + 0.8, dir, side: dir === 1 ? 'long' : 'short',
      } : null,
      momentum_up: rnd() > 0.5, above_ma200: rnd() > 0.4,
      analysis: [
        { time: '2026-07-02T04:07:00', action: pw >= 32 ? 'confirm' : 'reject', confidence: pw / 100,
          reasoning: `ML P(win)=${pw}% ${pw >= 32 ? '>=' : '<'} req 32% (RRR 3) | EV ${ev >= 0 ? '+' : ''}${ev}R | top: vol_20, macd_signal_norm, pool_pair_id` },
      ],
      logs: [

        { time: '2026-07-02T00:12:00', level: 'info', message: 'Adopted shared pooled model (no per-bot retrain needed)' },

  // ═══════════════════════════════════════
  // PROJECTION GENERATOR
  // ═══════════════════════════════════════

  function generateProjection(currentPrice, horizon) {
    const config = {
      '4h': { points: 8, histLen: 8 },
      '1d': { points: 24, histLen: 24 },
      '1w': { points: 7, histLen: 7 },
      '1m': { points: 30, histLen: 30 },
      '3m': { points: 13, histLen: 13 },
      '6m': { points: 26, histLen: 26 },
      '1y': { points: 52, histLen: 52 },
    };
    const cfg = config[horizon];
    const drift = 0.002;
    const vol = 0.015;

    let hist = [currentPrice];
    for (let i = 1; i < cfg.histLen; i++) {
      hist.unshift(hist[0] * (1 - drift + (Math.random()-0.5)*vol*2));
    }

    let proj = [], upper = [], lower = [];
    let seed = horizon.charCodeAt(0) * 137;
    function seededRandom() { seed = (seed * 16807) % 2147483647; return seed / 2147483647; }

    for (let i = 1; i <= cfg.points; i++) {
      let r = drift * i + (seededRandom()-0.5)*vol*0.5;
      let p = currentPrice * (1 + r);
      let width = vol * Math.sqrt(i) * 1.645 * currentPrice;
      proj.push(p);
      upper.push(p + width);
      lower.push(p - width);
    }

    return { hist, proj, upper, lower };
  }

  const CCY_FLAG = { USD:'us', EUR:'eu', GBP:'gb', JPY:'jp', CHF:'ch', AUD:'au', CAD:'ca', NZD:'nz', HKD:'hk' };
  const INDEX_FLAG = { SP500:'us', NASDAQ:'us', DOW:'us', DAX:'de', FTSE:'gb', CAC:'fr', IBEX:'es', PSI:'pt', STOXX50:'eu', NIKKEI:'jp', HANGSENG:'hk', ASX:'au' };

  function AssetIcon({ pair, botId, size = 20 }) {
    const [srcIdx, setSrcIdx] = useState(0);
    const market = botId && botId.startsWith('idx_') ? 'indices'
      : botId && botId.startsWith('fx_') ? 'forex'
      : botId && botId.startsWith('fut_') ? 'futures' : 'crypto';
    const flag = (code, st) => <img src={`https://flagcdn.com/w40/${code}.png`} alt={code}
      style={{ width: size * 0.92, height: size * 0.92, borderRadius: '50%', objectFit: 'cover', border: '1px solid var(--border-h)', ...st }} />;
    const letter = txt => (
      <span style={{ width: size, height: size, borderRadius: '50%', background: 'var(--accent-dim)', border: '1px solid var(--accent-bd)',
        display: 'inline-flex', alignItems: 'center', justifyContent: 'center', fontSize: size * 0.5, fontWeight: 700, color: 'var(--accent)', flexShrink: 0 }}>{txt}</span>
    );

    if (market === 'forex') {
      const clean = (pair || '').replace('/', '');
      const base = CCY_FLAG[clean.slice(0, 3)], quote = CCY_FLAG[clean.slice(3, 6)];
      if (base && quote) return (
        <span style={{ display: 'inline-flex', alignItems: 'center', flexShrink: 0 }}>
          {flag(base, { zIndex: 1 })}{flag(quote, { marginLeft: -size * 0.38 })}
        </span>
      );
      return letter((pair || '?').charAt(0));
    }
    if (market === 'indices') {
      const code = INDEX_FLAG[pair];
      return code ? flag(code, { width: size, height: size }) : letter((pair || '?').charAt(0));
    }
    if (market === 'futures') {
      const emo = FUT_EMOJI[pair];
      return emo ? <span style={{ fontSize: size * 0.85, lineHeight: 1, flexShrink: 0 }}>{emo}</span> : letter((pair || '?').charAt(0));
    }
    const sym = (pair || '').split('/')[0].toLowerCase();
    const sources = [
      `https://cdn.jsdelivr.net/gh/spothq/cryptocurrency-icons@master/svg/color/${sym}.svg`,
      `https://assets.coincap.io/assets/icons/${sym}@2x.png`,
    ];
    if (sym && srcIdx < sources.length) {
      return <img src={sources[srcIdx]} alt={sym} onError={() => setSrcIdx(srcIdx + 1)}
        style={{ width: size, height: size, borderRadius: '50%', flexShrink: 0 }} />;
    }
    return letter((sym || '?').charAt(0).toUpperCase());
  }

  // ═══════════════════════════════════════
  // EQUITY CURVE (SVG)
  // ═══════════════════════════════════════

  function EquityCurve({ data }) {
    const [tl, setTl] = useState('all');
    const [hov, setHov] = useState(null);
    const full = data && data.length > 1 ? data : [1000, 1000];
    const tlMap = { '1w': 7, '1m': 30, '3m': 90, '6m': 180, '1y': 365, 'all': Infinity };
    const n = tlMap[tl] || Infinity;
    const pts = n >= full.length ? full : full.slice(-n);
    const W = 600, H = 140, pl = 60, pr = 10, pt = 8, pb = 20;
    const minV = Math.min(...pts) - 20, maxV = Math.max(...pts) + 20, rng = maxV - minV || 1;
    const mx = i => pl + (i / (pts.length - 1)) * (W - pl - pr);
    const my = v => H - pb - ((v - minV) / rng) * (H - pt - pb);
    const line = pts.map((v, i) => `${i === 0 ? 'M' : 'L'}${mx(i).toFixed(1)},${my(v).toFixed(1)}`).join(' ');
    const area = line + ` L${mx(pts.length - 1).toFixed(1)},${H - pb} L${mx(0).toFixed(1)},${H - pb} Z`;
    const yl = Array.from({length: 6}, (_, i) => { const v = minV + rng * i / 5; return {v, y: my(v)}; });
    const onMove = e => {
      const svg = e.currentTarget; const rect = svg.getBoundingClientRect();
      const x = (e.clientX - rect.left) / rect.width * W;
      if (x < pl || x > W - pr) { setHov(null); return; }
      const idx = Math.round((x - pl) / (W - pl - pr) * (pts.length - 1));
      const ci = Math.max(0, Math.min(pts.length - 1, idx));
      setHov({ x: mx(ci), y: my(pts[ci]), val: pts[ci] });
    };
    const fmtV = v => v >= 10000 ? '$' + (v/1000).toFixed(1) + 'k' : '$' + v.toLocaleString('en-US',{maximumFractionDigits:0});
    return (
      <div>
        <div style={{display:'flex',gap:2,marginBottom:6,flexWrap:'wrap'}}>
          {[['1W','1w'],['1M','1m'],['3M','3m'],['6M','6m'],['1Y','1y'],['All','all']].map(([label,k]) => (
            <span key={k} className="pill-btn" onClick={()=>setTl(k)} style={{fontSize:9,padding:'2px 6px',borderRadius:3,cursor:'pointer',color:tl===k?'var(--accent)':'var(--text-muted)',background:tl===k?'var(--accent-dim)':'transparent',fontWeight:tl===k?600:400,transition:'all .12s',letterSpacing:'.02em'}}>{label}</span>
          ))}
        </div>
        <svg width="100%" viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="xMidYMid meet" style={{display:'block',cursor:'crosshair'}} onMouseMove={onMove} onMouseLeave={()=>setHov(null)}>
          <defs><linearGradient id="eq3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="var(--accent)" stopOpacity="0.15"/><stop offset="100%" stopColor="var(--accent)" stopOpacity="0"/></linearGradient></defs>
          {yl.map(({v, y}, i) => <g key={i}><line x1={pl} y1={y} x2={W - pr} y2={y} stroke="var(--border)" strokeWidth="1"/><text x={pl - 5} y={y + 3} fill="var(--text-muted)" fontSize="9" textAnchor="end" fontFamily="var(--mono)">{fmtV(v)}</text></g>)}
          <path d={area} fill="url(#eq3)"/>
          <path d={line} fill="none" stroke="var(--accent)" strokeWidth="1.8" style={{strokeDasharray:'8000',strokeDashoffset:'8000',animation:'drawIn 1.5s cubic-bezier(0.4,0,0.2,1) 0.15s forwards'}}/>
          {!hov&&pts.length>0&&<><circle cx={mx(pts.length-1)} cy={my(pts[pts.length-1])} r="3" fill="var(--accent)"/><circle cx={mx(pts.length-1)} cy={my(pts[pts.length-1])} r="6" fill="var(--accent)" opacity="0.15"/></>}
          {hov&&<>
            <line x1={hov.x} y1={pt} x2={hov.x} y2={H-pb} stroke="var(--accent)" strokeWidth="0.6" strokeDasharray="3,2" opacity="0.4"/>
            <line x1={pl} y1={hov.y} x2={W-pr} y2={hov.y} stroke="var(--accent)" strokeWidth="0.4" strokeDasharray="3,2" opacity="0.25"/>
            <circle cx={hov.x} cy={hov.y} r="3.5" fill="var(--accent)"/>
            <circle cx={hov.x} cy={hov.y} r="7" fill="var(--accent)" opacity="0.12"/>
            <rect x={hov.x-28} y={hov.y-20} width="56" height="15" rx="3" fill="var(--bg-raised)" stroke="var(--border)" strokeWidth="0.5"/>
            <text x={hov.x} y={hov.y-10} textAnchor="middle" fill="var(--accent)" fontSize="8.5" fontWeight="600" fontFamily="var(--mono)">{fmtV(hov.val)}</text>
          </>}
        </svg>
      </div>
    );
  }

  function TradeHistory({ trades }) {

    const fmtP = v => v >= 100 ? '$' + v.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}) : '$' + v.toFixed(4);
    const fmtDate = iso => { try { const d = new Date(iso); return `${d.getMonth()+1}/${d.getDate()}/${d.getFullYear()}`; } catch { return ''; } };

      <div style={{overflowX:'auto',WebkitOverflowScrolling:'touch'}}>
        <div style={{minWidth:340}}>
        <div style={{display:'grid',gridTemplateColumns:'16px 68px 1fr 70px 80px',gap:7,padding:'5px 0',borderBottom:'1px solid var(--border)',marginBottom:3}}>
          {['','Date','Entry \u2192 Exit','P&L','Reason'].map((h, i) => <span key={i} style={{fontSize:9,letterSpacing:'.07em',textTransform:'uppercase',color:'var(--text-muted)'}}>{h}</span>)}
        </div>
        {trades.map((t, i) => (
          <div key={i} style={{display:'grid',gridTemplateColumns:'16px 68px 1fr 70px 80px',gap:7,padding:'7px 0',borderBottom:'1px solid var(--border)',fontSize:11,animation:`fadeUp 0.2s ease ${i*0.04}s both`,alignItems:'center'}}>

  function PositionPanel({ detail }) {
    const pos = detail && detail.position;
    if (!pos) return <div className="no-position"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.4"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a4 4 0 0 1 8 0v2"/></svg>No position</div>;
    const fmtP = v => v >= 100 ? v.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}) : v.toFixed(4);
    const pnlPct = pos.current_pnl || 0;
    const pnlColor = pnlPct >= 0 ? 'var(--green)' : 'var(--red)';
    let durStr = '';
    if (pos.open_time) {
      const ms = Date.now() - new Date(pos.open_time).getTime();
      const h = Math.floor(Math.abs(ms) / 3600000); const m = Math.floor((Math.abs(ms) % 3600000) / 60000);
      durStr = `${h}h ${m}m`;
    }
    return (
      <div style={{display:'flex',flexDirection:'column',gap:9,paddingTop:4}}>
        <div style={{display:'flex',alignItems:'center',gap:7}}>
          <span className="status-dot status-dot-live" style={{background:'var(--orange)'}} />
          <span style={{fontWeight:600,fontSize:12,color:'var(--orange)'}}>LONG</span>
        </div>
        {[['Entry', '$' + fmtP(pos.entry)], ['Current', '$' + fmtP(detail.price)], ['Size', '$' + pos.size.toFixed(2)], ['Unrealized', null], ['Duration', durStr]].map(([l, v]) => (
          <div key={l} style={{display:'flex',justifyContent:'space-between',fontSize:11}}>
            <span style={{fontSize:10,textTransform:'uppercase',letterSpacing:'.06em',color:'var(--text-muted)'}}>{l}</span>
            {l === 'Unrealized' ? <span style={{fontWeight:600,color:pnlColor}}>{pnlPct >= 0 ? '+' : ''}{pnlPct.toFixed(2)}%</span> : <span style={{fontWeight:500}} className="t-mono">{v}</span>}
          </div>
        ))}
      </div>
    );
  }

  // ═══════════════════════════════════════
  // PRICE EXPECTATION (Chart.js)
  // ═══════════════════════════════════════

  function PriceExpectation({ botId, currentPrice }) {
    const [horizon, setHorizon] = useState('1w');
    const canvasRef = useRef(null);
    const chartRef = useRef(null);

    const horizons = [['4H','4h'],['1D','1d'],['1W','1w'],['1M','1m'],['3M','3m'],['6M','6m'],['1Y','1y']];
    // Cone coverage is only validated up to 1W - longer horizons are flagged as extrapolation
    const isExtrapolated = ['1m','3m','6m','1y'].includes(horizon);

    useEffect(() => {
      if (!canvasRef.current || typeof Chart === 'undefined') return;
      if (chartRef.current) chartRef.current.destroy();

      const data = generateProjection(currentPrice, horizon);
      const nHist = data.hist.length;

      const histLabels = data.hist.map((_, i) => `H${i}`);
      const projLabels = data.proj.map((_, i) => `P${i+1}`);
      const labels = [...histLabels, ...projLabels];

      const histLine = [...data.hist, ...Array(data.proj.length).fill(null)];
      const projLine = [...Array(nHist - 1).fill(null), data.hist[nHist - 1], ...data.proj];
      const upperLine = [...Array(nHist - 1).fill(null), data.hist[nHist - 1], ...data.upper];
      const lowerLine = [...Array(nHist - 1).fill(null), data.hist[nHist - 1], ...data.lower];

      const nowLinePlugin = {
        id: 'nowLine',
        afterDraw(chart) {
          const xScale = chart.scales.x;
          const yScale = chart.scales.y;
          const idx = nHist - 1;
          if (idx < 0 || idx >= labels.length) return;
          const x = xScale.getPixelForValue(idx);
          const ctx2 = chart.ctx;
          ctx2.save();
          ctx2.beginPath();
          ctx2.setLineDash([3, 3]);
          ctx2.strokeStyle = 'rgba(148,163,184,0.25)';
          ctx2.lineWidth = 1;
          ctx2.moveTo(x, yScale.top);
          ctx2.lineTo(x, yScale.bottom);
          ctx2.stroke();
          ctx2.setLineDash([]);
          ctx2.fillStyle = 'rgba(148,163,184,0.4)';
          ctx2.font = '8px JetBrains Mono, monospace';
          ctx2.textAlign = 'center';
          ctx2.fillText('NOW', x, yScale.top - 4);
          ctx2.restore();
        }
      };

      chartRef.current = new Chart(canvasRef.current.getContext('2d'), {
        type: 'line',
        plugins: [nowLinePlugin],
        data: {
          labels,
          datasets: [
            { label: 'Historical', data: histLine, borderColor: '#e2e8f0', borderWidth: 1.5, pointRadius: 0, fill: false, tension: 0.1, order: 1 },
            { label: 'Projected', data: projLine, borderColor: '#06b6d4', borderWidth: 2, borderDash: [6, 3], pointRadius: 0, fill: false, tension: 0.2, order: 2 },
            { label: 'Upper', data: upperLine, borderColor: 'rgba(6,182,212,0.25)', borderWidth: 1, borderDash: [2, 2], pointRadius: 0, fill: '+1', backgroundColor: 'rgba(6,182,212,0.06)', tension: 0.2, order: 3 },
            { label: 'Lower', data: lowerLine, borderColor: 'rgba(6,182,212,0.25)', borderWidth: 1, borderDash: [2, 2], pointRadius: 0, fill: false, tension: 0.2, order: 4 },
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: 'rgba(12,12,22,0.92)',
              borderColor: 'rgba(6,182,212,0.3)',
              borderWidth: 1,
              titleFont: { family: "'JetBrains Mono', monospace", size: 10 },
              bodyFont: { family: "'JetBrains Mono', monospace", size: 11 },
              titleColor: 'rgba(148,163,184,0.6)',
              bodyColor: '#e2e8f0',
              padding: 8,
              callbacks: {
                label: function(item) {
                  if (item.raw == null) return null;
                  const v = '$' + item.raw.toLocaleString('en-US', { maximumFractionDigits: 2 });
                  return item.dataset.label + ': ' + v;
                }
              },
              filter: function(item) { return item.raw != null; }
            }
          },
          scales: {
            x: {
              display: true,
              grid: { color: 'rgba(255,255,255,0.025)', drawBorder: false },
              ticks: { display: false },
            },
            y: {
              display: true,
              position: 'right',
              grid: { color: 'rgba(255,255,255,0.025)', drawBorder: false },
              ticks: {
                color: 'rgba(148,163,184,0.35)',
                font: { family: "'JetBrains Mono', monospace", size: 8 },
                callback: function(v) {
                  if (v >= 10000) return '$' + (v/1000).toFixed(1) + 'k';
                  if (v >= 1) return '$' + v.toLocaleString('en-US', { maximumFractionDigits: 2 });
                  return '$' + v.toFixed(4);
                }
              }
            }
          },
          animation: { duration: 500, easing: 'easeOutQuart' }
        }
      });

      return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
    }, [horizon, currentPrice]);

    const dirColor = '#10b981';
    const dirBg = 'rgba(16,185,129,0.08)';
    const dirBorder = 'rgba(16,185,129,0.2)';

    return (
      <div className="card" style={{marginBottom:14,padding:'14px 18px'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8,flexWrap:'wrap',gap:6}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:10,letterSpacing:'.08em',textTransform:'uppercase',color:'#06b6d4',fontWeight:600}}>Price Expectation</span>
            <span style={{fontSize:9,fontWeight:600,padding:'2px 6px',borderRadius:3,background:dirBg,color:dirColor,border:'1px solid '+dirBorder}}>
              &#8599; BULLISH (72%)
            </span>
            <span style={{fontSize:8,color:'rgba(148,163,184,0.35)',fontFamily:'var(--mono)'}}>3 models</span>
          </div>
          <div style={{display:'flex',gap:2,flexWrap:'wrap'}}>
            {horizons.map(([label,key]) => (
              <span key={key} className="pill-btn" onClick={()=>setHorizon(key)} style={{fontSize:9,padding:'2px 6px',borderRadius:3,cursor:'pointer',color:horizon===key?'#06b6d4':'var(--text-muted)',background:horizon===key?'rgba(6,182,212,0.08)':'transparent',fontWeight:horizon===key?600:400,transition:'all .12s',letterSpacing:'.02em'}}>{label}</span>
            ))}
          </div>
        </div>
        <div style={{position:'relative',height:200}}>
          <canvas ref={canvasRef} />
        </div>
        <div style={{display:'flex',justifyContent:'space-between',gap:8,flexWrap:'wrap',marginTop:4}}>
          <span style={{fontSize:8,color:'rgba(148,163,184,0.3)',fontStyle:'italic'}}>Model view, not a forecast</span>
          <span style={{fontSize:8,color:isExtrapolated?'rgba(245,158,11,0.55)':'rgba(148,163,184,0.3)',fontStyle:'italic'}}>
            {isExtrapolated ? 'Extrapolation - cone only validated up to 1W' : '90% band · backtested OOS coverage ≈ 83–96%'}
          </span>
        </div>
      </div>
    );
  }

  function BotDetail({ bot, onBack }) {

          <div style={{display:'flex',alignItems:'flex-start',gap:24,flexWrap:'wrap'}}>
            <div><div className="card-label">Price</div><div className="price-big">${fmt(detail.price)}</div></div>
            <div style={{display:'flex',gap:18,paddingTop:18,flexWrap:'wrap'}}>
              {[['MA50','$'+fmt(ind.ma_fast||0)],['MA200','$'+fmt(ind.ma_200||0)],['RSI',String(Math.round(ind.rsi||0))],['ATR%',(ind.atr_pct||0).toFixed(2)+'%'],['VOL',(ind.volume_ratio||0).toFixed(2)+'x']].map(([l,v],i)=>(
                <div key={i} style={{textAlign:'center'}}><div className="ind-label">{l}</div><div className="ind-value">{v}</div></div>

            <div style={{flex:1,paddingTop:18}}>
              <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                {detail.momentum_up && <span className="badge badge-green" style={{fontSize:10}}>&#8599; Momentum</span>}

                {hasPos && <span className="badge badge-orange" style={{fontSize:10}}>&#9650; POSITION OPEN</span>}
              </div>
            </div>
          </div>
        </div>

        <div className="metrics-grid stagger">
          {[
            {l:'Capital',v:`$${fmt(bot.capital)}`,s:`${bot.change>=0?'+':''}${bot.change.toFixed(2)}%`,sc:bot.change>=0?'var(--green)':'var(--red)'},
            {l:'Win Rate',v:met.win_rate!=null?met.win_rate.toFixed(0)+'%':'\u2014',s:`${met.wins||0}W / ${met.losses||0}L`,sc:'var(--text-muted)'},
            {l:'Profit Factor',v:met.profit_factor!=null?met.profit_factor.toFixed(2):'\u2014',s:'',sc:''},
            {l:'Trades',v:String(met.total_trades||0),s:'',sc:''},
            {l:'Best / Worst',v:'',s:`${met.best_trade!=null?'+'+met.best_trade.toFixed(2)+'%':'\u2014'} / ${met.worst_trade!=null?met.worst_trade.toFixed(2)+'%':'\u2014'}`,sc:'var(--text-muted)'},
            {l:'Fees',v:met.fees_paid!=null?'$'+met.fees_paid.toFixed(2):'$0.00',s:'',sc:''}
          ].map(({l,v,s,sc},i)=>(
            <div className="metric-card" key={i}><div className="metric-label">{l}</div>{v&&<div className="metric-value">{v}</div>}{s&&<div className="metric-sub" style={{color:sc||'inherit'}}>{s}</div>}</div>

            <div className="panel"><div className="panel-title">Logs</div><div className="panel-scroll">

        </div>
        {bestBot && (
          <div style={{ marginTop: 8, fontSize: 10, color: 'var(--text-muted)' }}>
            Best: <span style={{ color: 'var(--green)', fontWeight: 600 }}>{bestBot.pair}</span> ({bestBot.change >= 0 ? '+' : ''}{bestBot.change.toFixed(2)}%)
          </div>
        )}
      </div>
    );
  }

  // ═══════════════════════════════════════
  // RECENT ACTIVITY ITEM - mirrors v3-lobby.jsx
  // ═══════════════════════════════════════

  function ActivityItem({ event, onBotClick }) {
    const [expanded, setExpanded] = useState(false);
    const isTrade = event.type === 'trade_close' || event.type === 'trade_open';
    const isReject = event.type === 'signal_rejected';
    const d = event.data || {};

    const fmtTime = iso => {
      try { const dt = new Date(iso); return dt.toLocaleString('en-US', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' }); }
      catch { return ''; }
    };

    const typeLabel = {
      trade_close: 'Trade Closed',
      trade_open: 'Position Opened',
      signal_rejected: 'Signal Rejected',
    }[event.type] || event.type;

    const typeColor = {
      trade_close: d.pnl_pct >= 0 ? 'var(--green)' : 'var(--red)',
      trade_open: 'var(--orange)',
      signal_rejected: 'var(--text-muted)',
    }[event.type] || 'var(--text-dim)';

    const marketBadges = {
      indices: { bg: 'rgba(6,182,212,0.08)', color: '#06b6d4', border: 'rgba(6,182,212,0.2)', label: 'IDX' },
      forex:   { bg: 'rgba(16,185,129,0.08)', color: '#10b981', border: 'rgba(16,185,129,0.2)', label: 'FX' },
      futures: { bg: 'rgba(245,158,11,0.08)', color: '#f59e0b', border: 'rgba(245,158,11,0.2)', label: 'FUT' },
      crypto:  { bg: 'rgba(139,92,246,0.08)', color: '#8b5cf6', border: 'rgba(139,92,246,0.2)', label: 'CRYPTO' },
    };
    const marketBadge = marketBadges[event.market] || marketBadges.crypto;

    return (
      <div style={{ borderBottom: '1px solid var(--border)', padding: '10px 0' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, cursor: 'pointer' }} onClick={() => setExpanded(!expanded)}>
          <span style={{ fontSize: 14, color: typeColor, fontWeight: 600, width: 18 }}>
            {event.type === 'trade_close' ? (d.pnl_pct >= 0 ? '↑' : '↓') : event.type === 'trade_open' ? '▲' : '○'}
          </span>
          <span style={{ fontSize: 10, color: 'var(--text-muted)', fontFamily: 'var(--mono)', minWidth: 100 }}>{fmtTime(event.timestamp)}</span>
          <span className="badge" style={{ background: marketBadge.bg, color: marketBadge.color, border: `1px solid ${marketBadge.border}`, fontSize: 8, padding: '1px 5px' }}>{marketBadge.label}</span>
          <span style={{ fontSize: 12, fontWeight: 600 }}>{event.symbol}</span>
          <span style={{ fontSize: 11, color: typeColor }}>{typeLabel}</span>
          {isTrade && event.type === 'trade_close' && (
            <span style={{ marginLeft: 'auto', fontFamily: 'var(--mono)', fontSize: 12, fontWeight: 600, color: d.pnl_pct >= 0 ? 'var(--green)' : 'var(--red)' }}>
              {d.pnl_pct >= 0 ? '+' : ''}{d.pnl_pct?.toFixed(2)}% (${d.pnl_usdt?.toFixed(2)})
            </span>
          )}
          {isReject && (
            <span style={{ marginLeft: 'auto', fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--text-muted)' }}>
              Conf: {Math.round((d.llm_confidence || 0) * 100)}%
            </span>
          )}
          <span style={{ fontSize: 10, color: 'var(--text-muted)', transform: expanded ? 'rotate(90deg)' : 'none', transition: 'transform .15s' }}>▶</span>
        </div>
        {expanded && (
          <div style={{ marginTop: 8, marginLeft: 28, padding: '10px 14px', background: 'var(--bg-card)', borderRadius: 'var(--radius)', border: '1px solid var(--border)' }}>
            {event.type === 'trade_close' && (<>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 10, fontSize: 11, marginBottom: 8 }}>
                <div><span className="t-muted">Entry</span><div className="t-mono" style={{ fontWeight: 500 }}>${d.entry_price?.toLocaleString()}</div></div>
                <div><span className="t-muted">Exit</span><div className="t-mono" style={{ fontWeight: 500 }}>${d.exit_price?.toLocaleString()}</div></div>
                <div><span className="t-muted">Reason</span><div><span className={`trade-tag ${d.pnl_pct >= 0 ? 'tag-profit' : 'tag-loss'}`}>{d.close_reason}</span></div></div>
              </div>
              {d.llm_analysis && (
                <div style={{ fontSize: 11, color: 'var(--text-dim)', lineHeight: 1.5, borderTop: '1px solid var(--border)', paddingTop: 8 }}>
                  <span style={{ fontSize: 9, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '.06em' }}>ML Analysis</span>
                  <div style={{ marginTop: 3 }}>{d.llm_analysis}</div>
                </div>
              )}
            </>)}
            {event.type === 'signal_rejected' && (
              <div style={{ fontSize: 11, color: 'var(--text-dim)', lineHeight: 1.5 }}>
                <div style={{ marginBottom: 4 }}><span className="t-muted">Signal:</span> {d.signal}</div>
                <div style={{ marginBottom: 4 }}><span className="t-muted">Confidence:</span> {Math.round((d.llm_confidence || 0) * 100)}%</div>
                {d.llm_reasoning && <div>{d.llm_reasoning}</div>}
              </div>
            )}
            {event.type === 'trade_open' && (
              <div style={{ fontSize: 11, color: 'var(--text-dim)' }}>
                <span className="t-muted">Entry:</span> ${d.entry_price?.toLocaleString()} | <span className="t-muted">Size:</span> ${d.size?.toFixed(2)}
              </div>
            )}
            <div style={{ marginTop: 8, textAlign: 'right' }}>
              <span style={{ fontSize: 10, color: 'var(--accent)', cursor: 'pointer' }} onClick={e => { e.stopPropagation(); onBotClick && onBotClick(event.bot_id); }}>Ver Bot →</span>
            </div>
          </div>
        )}
      </div>
    );
  }

  // ═══════════════════════════════════════
  // PORTFOLIO VIEW - unified Lobby / per-market (mirrors v3-lobby.jsx)
  // ═══════════════════════════════════════

  function PortfolioView({ filter, onSelectBot, onNavMarket }) {
    const [time, setTime] = useState(new Date());
    const [animated, setAnimated] = useState(0);

    const bots = DEMO_BOTS;
    const filteredBots = filter === 'all' ? bots : bots.filter(b => b.market === filter);
    const initOf = b => b.capital / (1 + b.change / 100);
    const totalCapital = filteredBots.reduce((s, b) => s + b.capital, 0);
    const totalInit = filteredBots.reduce((s, b) => s + initOf(b), 0);
    const totalProfitPct = totalInit ? ((totalCapital - totalInit) / totalInit * 100) : 0;
    const activity = (filter === 'all' ? DEMO_ACTIVITY : DEMO_ACTIVITY.filter(e => e.market === filter)).slice(0, 10);

    useEffect(() => { const t = setInterval(() => setTime(new Date()), 1000); return () => clearInterval(t); }, []);

    useEffect(() => {
      let start = null; const dur = 1100;
      const step = ts => { if (!start) start = ts; const p = Math.min((ts - start) / dur, 1); const e = p < 0.5 ? 2 * p * p : -1 + (4 - 2 * p) * p; setAnimated(totalCapital * e); if (p < 1) requestAnimationFrame(step); };
      requestAnimationFrame(step);
    }, [filter]);

    const fmt = d => d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    const fmtM = v => v.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

    const cryptoBots = bots.filter(b => b.market === 'crypto');
    const indexBots = bots.filter(b => b.market === 'indices');
    const forexBots = bots.filter(b => b.market === 'forex');
    const futuresBots = bots.filter(b => b.market === 'futures');

    const openBots = filteredBots.filter(b => b.has_position);

    const totalTrades = filteredBots.reduce((s, b) => s + b.trades, 0);
    const winCount = filteredBots.reduce((s, b) => s + (b.change >= 0 ? 1 : 0), 0);
    const globalWinRate = filteredBots.length ? Math.round(winCount / filteredBots.length * 100) : 0;

    const bestOf = arr => arr.length ? arr.reduce((best, b) => b.change > best.change ? b : best) : null;

    const tickerItems = filteredBots.map(b => {
      const sym = (b.market === 'indices' || b.market === 'forex' || b.market === 'futures') ? b.pair : b.pair.split('/')[0];
      const sign = b.change >= 0 ? '+' : '';
      const col = b.has_position ? 'var(--orange)' : b.change >= 0 ? 'var(--green)' : 'var(--red)';
      const price = b.price >= 1 ? b.price.toLocaleString('en-US', { maximumFractionDigits: 2 }) : b.price.toFixed(4);
      return { dot: col, text: `${sym} $${price} ${sign}${b.change.toFixed(2)}%` };
    });
    const tickerDup = [...tickerItems, ...tickerItems];

    const isLobby = filter === 'all';
    const titleMap = { all: 'Portfolio Lobby', crypto: 'Crypto Portfolio', indices: 'Indices Portfolio', forex: 'Forex Portfolio', futures: 'Futures Portfolio' };
    const title = titleMap[filter] || 'Portfolio';

    const mktStats = (arr) => {
      const cap = arr.reduce((s, b) => s + b.capital, 0);
      const init = arr.reduce((s, b) => s + initOf(b), 0);
      return { cap, pnl: init ? ((cap - init) / init * 100) : 0, open: arr.filter(b => b.has_position).length };
    };
    const cryptoS = mktStats(cryptoBots);
    const idxS = mktStats(indexBots);
    const fxS = mktStats(forexBots);
    const futS = mktStats(futuresBots);

    const handleBotClick = botId => {
      const b = bots.find(x => x.id === botId);
      if (b && onSelectBot) onSelectBot(b);
    };

    return (
      <div className="main-content page-anim">
        {/* Header */}
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
          <div className="page-title">{title}</div>
          <div style={{ display: 'flex', gap: 6 }}>
            <span className="badge badge-accent">Lyra 3.0</span>
            <span className="badge badge-green">ML Filter On</span>
          </div>
        </div>

        {/* Ticker */}
        <div className="news-ticker">
          <div className="news-ticker-inner">
            {tickerDup.map((it, i) => (
              <span className="news-ticker-item" key={i}>
                <span className="ticker-dot" style={{ background: it.dot }} />
                {it.text}
              </span>
            ))}
          </div>
        </div>

        {/* Top Metric Cards */}
        <div className="stat-grid stagger">
          <div className="card">
            <div className="card-label">Total Capital</div>
            <div className="card-value">${fmtM(animated)}</div>
            <div className={`card-sub ${totalProfitPct >= 0 ? 't-green' : 't-red'}`}>
              {totalProfitPct >= 0 ? '+' : ''}{totalProfitPct.toFixed(2)}%
            </div>
          </div>
          <div className="card">
            <div className="card-label">Total PnL</div>
            <div className="card-value" style={{ color: totalProfitPct >= 0 ? 'var(--green)' : 'var(--red)' }}>
              {totalProfitPct >= 0 ? '+' : ''}{totalProfitPct.toFixed(2)}%
            </div>
            <div className="card-sub">{filteredBots.length} bot{filteredBots.length !== 1 ? 's' : ''} | {openBots.length} open</div>
          </div>
          <div className="card">
            <div className="card-label">{isLobby ? 'Server' : 'Win Rate'}</div>
            {isLobby ? (
              <>
                <div className="card-value" style={{ fontSize: 18, fontFamily: 'var(--mono)' }}>{fmt(time)}</div>
                <div className="card-sub t-green">All systems running</div>
              </>
            ) : (
              <>
                <div className="card-value">{globalWinRate}%</div>
                <div className="card-sub">{totalTrades} trades total</div>
              </>
            )}
          </div>
        </div>

        {/* Open positions banner */}
        {openBots.length > 0 && (
          <div className="pos-banner">
            <span className="status-dot status-dot-live" style={{ background: 'var(--orange)' }} />
            <span className="t-dim">Open positions:</span>
            {openBots.map(b => (
              <span key={b.id} style={{ cursor: 'pointer' }} onClick={() => onSelectBot && onSelectBot(b)}>
                <span style={{ fontWeight: 600, color: 'var(--orange)' }}>{b.pair}</span>
              </span>
            ))}
          </div>
        )}

        {/* LOBBY MODE: Market blocks */}
        {isLobby && (
          <div style={{ display: 'flex', gap: 16, marginBottom: 20, flexWrap: 'wrap' }}>
            <MarketBlock
              label="Crypto Trading"
              color="#8b5cf6"
              colorDim="rgba(139,92,246,0.06)"
              colorBorder="rgba(139,92,246,0.15)"
              capital={cryptoS.cap}
              pnl={cryptoS.pnl}
              numBots={cryptoBots.length}
              openPositions={cryptoS.open}
              bestBot={bestOf(cryptoBots)}
              onClick={() => onNavMarket && onNavMarket('crypto')}
            />
            <MarketBlock
              label="World Indices"
              color="#06b6d4"
              colorDim="rgba(6,182,212,0.06)"
              colorBorder="rgba(6,182,212,0.15)"
              capital={idxS.cap}
              pnl={idxS.pnl}
              numBots={indexBots.length}
              openPositions={idxS.open}
              bestBot={bestOf(indexBots)}
              onClick={() => onNavMarket && onNavMarket('indices')}
            />
            <MarketBlock
              label="Forex"
              color="#10b981"
              colorDim="rgba(16,185,129,0.06)"
              colorBorder="rgba(16,185,129,0.15)"
              capital={fxS.cap}
              pnl={fxS.pnl}
              numBots={forexBots.length}
              openPositions={fxS.open}
              bestBot={bestOf(forexBots)}
              onClick={() => onNavMarket && onNavMarket('forex')}
            />
            <MarketBlock
              label="Futures"
              color="#f59e0b"
              colorDim="rgba(245,158,11,0.06)"
              colorBorder="rgba(245,158,11,0.15)"
              capital={futS.cap}
              pnl={futS.pnl}
              numBots={futuresBots.length}
              openPositions={futS.open}
              bestBot={bestOf(futuresBots)}
              onClick={() => onNavMarket && onNavMarket('futures')}
            />
          </div>
        )}

        {/* PORTFOLIO MODE: Bot cards grid */}
        {!isLobby && filteredBots.length > 0 && (
          <>
            <div className="section-label">Active Markets</div>
            <div className="market-grid stagger">
              {filteredBots.map(b => (
                <MarketCard key={b.id} bot={b} onClick={() => onSelectBot && onSelectBot(b)} />
              ))}
            </div>
          </>
        )}

        {/* Recent Activity */}
        {activity.length > 0 && (
          <div style={{ marginTop: 20 }}>
            <div className="section-label">Recent Activity</div>
            <div className="card" style={{ padding: '10px 16px' }}>
              {activity.map((ev, i) => (
                <ActivityItem key={i} event={ev} onBotClick={handleBotClick} />
              ))}
            </div>
          </div>
        )}
      </div>
    );
  }

  const RISK_LIMITS = { total: 8, crypto: 3, forex: 3, indices: 2, futures: 3, per_currency: 2, agg_exposure_pct: 35 };

  function RiskBar({ label, used, limit }) {
    const pct = Math.min(used / limit * 100, 100);
    const full = used >= limit;
    return (
      <div style={{marginBottom:12}}>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:4}}>
          <span className="t-dim" style={{textTransform:'capitalize'}}>{label}</span>
          <span style={{fontFamily:'var(--mono)',color: full ? 'var(--orange)' : 'var(--text)'}}>
            {used}/{limit}{full ? ' FULL' : ''}
          </span>
        </div>
        <div style={{height:6,background:'rgba(255,255,255,0.06)',borderRadius:3,overflow:'hidden'}}>
          <div style={{height:'100%',width:`${pct}%`,borderRadius:3,transition:'width .6s',
                       background: full ? 'var(--orange)' : 'var(--accent)'}} />
        </div>
      </div>
    );
  }

  function RiskPage() {
    const open = DEMO_BOTS.filter(b => b.has_position);
    const marketOf = id => id.startsWith('fx_') ? 'forex' : id.startsWith('idx_') ? 'indices' : id.startsWith('fut_') ? 'futures' : 'crypto';
    const byMarket = { crypto:0, forex:0, indices:0, futures:0 };
    open.forEach(b => byMarket[marketOf(b.id)]++);
    const clusters = [];
    open.filter(b => marketOf(b.id) === 'forex').forEach(b => {
      const [a, q] = b.pair.split('/');
      [a, q].forEach(c => { const e = clusters.find(x => x.ccy === c); e ? e.n++ : clusters.push({ ccy: c, n: 1 }); });
    });
    // real calibration snapshot (counterfactual resolver, post-dedup)
    const calib = [
      { bucket: '0-10%', n: 10, pred: 8, real: 40 },
      { bucket: '10-30%', n: 10, pred: 21, real: 0 },
      { bucket: '30-50%', n: 6, pred: 37, real: 0 },
      { bucket: '50-70%', n: 11, pred: 59, real: 36 },
      { bucket: '70-90%', n: 10, pred: 83, real: 20 },
      { bucket: '90-100%', n: 4, pred: 93, real: 50 },
    ];
    const cell = { padding:'7px 10px', fontSize:11, fontFamily:'var(--mono)' };
    return (
      <div className="main-content page-anim">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
          <div className="page-title">Risk &amp; Calibration</div>
          <span className="badge badge-accent">Lyra 3.0</span>
        </div>

        <div className="stat-grid stagger">
          <div className="card">
            <div className="card-label">Open Positions</div>
            <div className="card-value">{open.length}<span style={{fontSize:14,color:'var(--text-muted)'}}> / {RISK_LIMITS.total}</span></div>
            <div className="card-sub t-dim">portfolio-wide cap</div>
          </div>
          <div className="card">
            <div className="card-label">Aggregate Exposure</div>
            <div className="card-value">9.6%<span style={{fontSize:14,color:'var(--text-muted)'}}> / {RISK_LIMITS.agg_exposure_pct}%</span></div>
            <div className="card-sub t-dim">of initial capital</div>
          </div>
          <div className="card">
            <div className="card-label">Blocked Entries</div>
            <div className="card-value" style={{color:'var(--orange)'}}>3</div>
            <div className="card-sub t-dim">this week (limits held)</div>
          </div>
        </div>

        <div className="section-label">Exposure vs Limits - correlated bots are one bet, not many</div>
        <div className="card" style={{marginBottom:16}}>
          {Object.entries(byMarket).map(([m, n]) => <RiskBar key={m} label={m} used={n} limit={RISK_LIMITS[m]} />)}
        </div>

        <div className="section-label">Currency Clusters (max {RISK_LIMITS.per_currency} per currency)</div>
        <div className="card" style={{marginBottom:16,display:'flex',gap:8,flexWrap:'wrap'}}>
          {clusters.map(c => (
            <span key={c.ccy} className="badge" style={{fontFamily:'var(--mono)',
                  borderColor: c.n >= RISK_LIMITS.per_currency ? 'var(--orange)' : undefined,
                  color: c.n >= RISK_LIMITS.per_currency ? 'var(--orange)' : undefined}}>
              {c.ccy} &times;{c.n}
            </span>
          ))}
        </div>

        <div className="section-label">P(win) Calibration - predicted vs realized (counterfactual resolver)</div>
        <div className="card" style={{padding:0,overflow:'hidden'}}>
          <div style={{display:'grid',gridTemplateColumns:'1.2fr 0.6fr 1fr 1fr',background:'rgba(255,255,255,0.04)'}}>
            {['Bucket','n','Predicted','Realized'].map(h => <div key={h} style={{...cell,color:'var(--text-muted)',fontFamily:'inherit'}}>{h}</div>)}
          </div>
          {calib.map(r => (
            <div key={r.bucket} style={{display:'grid',gridTemplateColumns:'1.2fr 0.6fr 1fr 1fr',borderTop:'1px solid rgba(255,255,255,0.05)'}}>
              <div style={cell}>{r.bucket}</div>
              <div style={cell}>{r.n}</div>
              <div style={cell}>{r.pred}%</div>
              <div style={{...cell,color: Math.abs(r.pred - r.real) > 25 ? 'var(--orange)' : 'var(--green)'}}>{r.real}%</div>
            </div>
          ))}
          <div style={{padding:'9px 10px',fontSize:10,color:'var(--text-muted)',borderTop:'1px solid rgba(255,255,255,0.05)'}}>
            Every gate decision (confirm and reject) is graded against what the market actually did.
            Sample still small (n=51) - the pooled models below exist because the per-bot models this measured were overconfident.
          </div>
        </div>
      </div>
    );
  }

  // ═══════════════════════════════════════
  // ML MODELS PAGE (pooled per-market)
  // ═══════════════════════════════════════

  function MLModelsPage() {
    const pools = [
      { pool: 'forex/4h', samples: '81,919', pairs: 28, acc: '60.7%', dirs: 'long + short' },
      { pool: 'crypto/1h', samples: '77,031', pairs: 9, acc: '55.2%', dirs: 'long' },
      { pool: 'crypto/4h', samples: '37,611', pairs: 9, acc: '56.4%', dirs: 'long + short' },
      { pool: 'forex/1d', samples: '30,772', pairs: 28, acc: '57.8%', dirs: 'long' },
      { pool: 'futures/4h', samples: '26,949', pairs: 10, acc: '51.9%', dirs: 'long' },
      { pool: 'indices/1d', samples: '12,687', pairs: 12, acc: '54.6%', dirs: 'long' },
      { pool: 'crypto/1d', samples: '11,028', pairs: 9, acc: '53.1%', dirs: 'long' },
    ];
    const cell = { padding:'7px 10px', fontSize:11, fontFamily:'var(--mono)' };
    return (
      <div className="main-content page-anim">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
          <div className="page-title">ML Models</div>
          <span className="badge badge-green">Meta-labeling gate</span>
        </div>

        <div className="card" style={{marginBottom:16,fontSize:12,lineHeight:1.7,color:'var(--text-dim)'}}>
          The model doesn't predict market direction - it answers one question per signal:
          <span style={{color:'var(--text)'}}> "does this entry win with this bot's stop and take-profit?"</span> (triple-barrier
          meta-labeling). A signal only becomes a trade when P(win) beats the reward/risk breakeven with margin.
          One <span style={{color:'var(--accent)'}}>pooled model per market &amp; timeframe</span> - trained on every pair of the
          market at once - serves all bots: 9 models for 36 bots, 11k-82k samples each instead of ~800 per bot.
        </div>

        <div className="stat-grid stagger" style={{gridTemplateColumns:'repeat(3, 1fr)'}}>
          <div className="card"><div className="card-label">Pooled Models</div><div className="card-value">9</div><div className="card-sub t-dim">7 long + 2 short</div></div>
          <div className="card"><div className="card-label">Largest Pool</div><div className="card-value">81.9k</div><div className="card-sub t-dim">forex/4h, 28 pairs</div></div>
          <div className="card"><div className="card-label">Retrain Cadence</div><div className="card-value">~80h</div><div className="card-sub t-dim">1 train serves all bots</div></div>
        </div>

        <div className="section-label">Pooled Models</div>
        <div className="card" style={{padding:0,overflow:'hidden',marginBottom:16}}>
          <div style={{display:'grid',gridTemplateColumns:'1.1fr 1fr 0.6fr 0.8fr 1fr',background:'rgba(255,255,255,0.04)'}}>
            {['Pool','Samples','Pairs','Test acc','Directions'].map(h => <div key={h} style={{...cell,color:'var(--text-muted)',fontFamily:'inherit'}}>{h}</div>)}
          </div>
          {pools.map(p => (
            <div key={p.pool} style={{display:'grid',gridTemplateColumns:'1.1fr 1fr 0.6fr 0.8fr 1fr',borderTop:'1px solid rgba(255,255,255,0.05)'}}>
              <div style={{...cell,color:'var(--accent)'}}>{p.pool}</div>
              <div style={cell}>{p.samples}</div>
              <div style={cell}>{p.pairs}</div>
              <div style={cell}>{p.acc}</div>
              <div style={{...cell,fontFamily:'inherit',fontSize:10,color:'var(--text-dim)'}}>{p.dirs}</div>
            </div>
          ))}
        </div>

        <div className="section-label">Live Gate Decision (example)</div>
        <div className="card" style={{fontFamily:'var(--mono)',fontSize:11,lineHeight:1.8}}>
          <div style={{color:'var(--green)'}}>ML CONFIRMED (64%)</div>
          <div className="t-dim">ML P(win)=64% &gt;= req 32% (RRR 3) | EV +1.57R | top: vol_10, vol_20, macd_signal_norm | sent=+0.07</div>
          <div style={{color:'var(--text-muted)',fontSize:10,marginTop:8,fontFamily:'inherit'}}>
            Probabilities are clamped to [0.10, 0.85] until enough resolved predictions exist for formal
            isotonic calibration - an honest model is worth more than a confident one.
          </div>
        </div>
      </div>
    );
  }

  function App() {
    const [page, setPage] = useState('lobby');
    const [bot, setBot] = useState(null);

    const nav = p => setPage(p);

    // market accent theme on body - mirrors v3-app.jsx
    useEffect(() => {
      document.body.classList.remove('theme-indices', 'theme-forex', 'theme-futures');
      const themeClasses = { indices: 'theme-indices', forex: 'theme-forex', futures: 'theme-futures' };
      if (themeClasses[page]) document.body.classList.add(themeClasses[page]);
    }, [page]);

    const handleSelectBot = b => { setBot(b); nav('botdetail'); };

    const marketPages = ['lobby', 'crypto', 'indices', 'forex', 'futures'];

    return (
      <div className="app-layout">
        <Sidebar page={page} onNav={nav} />

        {marketPages.includes(page) && (
          <PortfolioView key={page} filter={page === 'lobby' ? 'all' : page}
            onSelectBot={handleSelectBot} onNavMarket={nav} />
        )}
        {page === 'botdetail' && bot && <BotDetail bot={bot} onBack={() => nav(bot.market || 'lobby')} />}
        {page === 'analytics' && <AnalyticsPage />}
        {page === 'risk' && <RiskPage />}
        {page === 'ml' && <MLModelsPage />}
        {page === 'settings' && <SettingsPage />}
      </div>
    );
  }

  // ═══════════════════════════════════════
  // RENDER
  // ═══════════════════════════════════════

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
